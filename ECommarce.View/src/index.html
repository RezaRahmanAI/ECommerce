<!doctype html>
<html lang="en" class="light">
  <head>
    <meta charset="utf-8" />
    <title>SheraShopBD24</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <app-root>
      <!-- Pre-bootstrap loader before Angular fully executes -->
      <div style="display:flex; height:100vh; align-items:center; justify-content:center; background-color:#FAFAFA; margin:0; padding:0;">
        <div style="width:40px; height:40px; border:3px solid #e0e0e0; border-top:3px solid #c8922a; border-radius:50%; animation:css-spin 1s linear infinite;"></div>
        <style>@keyframes css-spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } body { margin: 0; }</style>
      </div>
    </app-root>
  </body>
</html>
