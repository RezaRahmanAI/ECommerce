<!doctype html>
<html lang="en" class="light">
  <head>
    <meta charset="utf-8" />
    <title>SheraShopBD</title>
    <meta
      name="description"
      content="SheraShopBD — Premium fashion and lifestyle e-commerce. Shop the latest trends in clothing, accessories, and more."
    />
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />

    <!-- Preconnect for faster font & API loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://api.sherashopbd.com" crossorigin />
    <link rel="dns-prefetch" href="https://api.sherashopbd.com" />

    <!-- Google Fonts -->
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Hind+Siliguri:wght@400;500;600;700&display=swap"
      as="style"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Hind+Siliguri:wght@400;500;600;700&display=swap"
      media="print"
      onload="this.media = 'all'"
    />

    <!-- Critical CSS inline hint -->
    <style>
      body { visibility: hidden; }
      body.loaded { visibility: visible; }
    </style>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        document.body.classList.add('loaded');
      });
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
