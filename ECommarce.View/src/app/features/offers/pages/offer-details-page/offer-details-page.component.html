<div class="offer-overlay">
  <div class="offer-modal">
    <div class="offer-header">
      <div>
        <p class="offer-badge">{{ offer?.badge }}</p>
        <h1 class="offer-title">{{ offer?.title }}</h1>
        <p class="offer-subtitle">{{ offer?.subtitle }}</p>
      </div>
      <a class="offer-close" routerLink="/" aria-label="Close offer">
        <lucide-icon [img]="icons.X" class="w-5 h-5"></lucide-icon>
      </a>
    </div>

    <div class="offer-content">
      <div class="offer-media">
        <img
          [src]="
            offer?.imageUrl ? imageUrlService.getImageUrl(offer!.imageUrl) : ''
          "
          [alt]="offer?.title"
        />
        <div class="offer-price">
          <app-price-display
            [amount]="offer?.price ?? 0"
            size="lg"
          ></app-price-display>
          <p class="text-xs text-gray-500">
            Per set • Taxes calculated at checkout
          </p>
        </div>
      </div>

      <div class="offer-details">
        <p class="text-gray-600 leading-relaxed">
          {{ offer?.description }}
        </p>
        <div class="share-callout">
          <p class="text-sm font-semibold text-primary">Shareable offer link</p>
          <p class="text-xs text-gray-500">
            Perfect for social ads and promos: /offer/{{ offer?.slug }}
          </p>
        </div>

        <form
          class="offer-form"
          [formGroup]="orderForm"
          (ngSubmit)="submitOrder()"
        >
          <h2 class="text-lg font-semibold text-primary">Place your order</h2>

          <div class="field-grid">
            <label>
              <span>Full name</span>
              <input
                type="text"
                formControlName="fullName"
                placeholder="Enter your name"
              />
            </label>
            <label>
              <span>Phone</span>
              <input
                type="tel"
                formControlName="phone"
                placeholder="e.g. +1 555 123 4567"
              />
            </label>
          </div>

          <!-- Delivery Zone Selection -->
          <div class="space-y-4 my-2">
            <label class="block text-xs font-bold text-gray-500 uppercase ml-1">
              Delivery Area
            </label>
            <div class="grid grid-cols-2 gap-3">
              <!-- Inside Dhaka -->
              <label 
                class="flex items-center p-3 border rounded-lg cursor-pointer transition-all duration-200"
                [ngClass]="{
                  'border-black bg-black/5': orderForm.get('city')?.value === 'Dhaka',
                  'border-gray-200 bg-white hover:bg-gray-50': orderForm.get('city')?.value !== 'Dhaka'
                }"
              >
                <input
                  type="radio"
                  formControlName="city"
                  value="Dhaka"
                  class="w-3.5 h-3.5 text-black focus:ring-black border-gray-300"
                />
                <span class="ml-2 text-xs font-bold text-gray-700">Inside Dhaka</span>
              </label>

              <!-- Outside Dhaka -->
              <label 
                class="flex items-center p-3 border rounded-lg cursor-pointer transition-all duration-200"
                [ngClass]="{
                  'border-black bg-black/5': orderForm.get('city')?.value === 'Outside Dhaka',
                  'border-gray-200 bg-white hover:bg-gray-50': orderForm.get('city')?.value !== 'Outside Dhaka'
                }"
              >
                <input
                  type="radio"
                  formControlName="city"
                  value="Outside Dhaka"
                  class="w-3.5 h-3.5 text-black focus:ring-black border-gray-300"
                />
                <span class="ml-2 text-xs font-bold text-gray-700">Outside Dhaka</span>
              </label>
            </div>
          </div>

          <label>
            <span>Delivery address</span>
            <textarea
              rows="2"
              formControlName="address"
              placeholder="House, Road, Block etc."
            ></textarea>
          </label>

          <div class="field-grid">
            <label>
              <span>Quantity</span>
              <input
                type="number"
                formControlName="quantity"
                min="1"
                max="10"
              />
            </label>
          </div>

          <div class="total-row">
            <span>Total</span>
            <app-price-display [amount]="total" size="md"></app-price-display>
          </div>

          <p *ngIf="errorMessage" class="error-text">{{ errorMessage }}</p>
          <p *ngIf="successMessage" class="success-text">
            {{ successMessage }}
          </p>

          <button type="submit" [disabled]="isLoading">
            {{ isLoading ? "Placing order..." : "Submit order" }}
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
