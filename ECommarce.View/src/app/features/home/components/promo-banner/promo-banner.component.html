<section class="py-12 md:py-16 lg:py-20 bg-white" *ngIf="promoBanner$ | async as banner">
  <div class="site-container">
    <div class="mx-auto">
      <a
        [routerLink]="banner.linkUrl"
        class="relative overflow-hidden min-h-[300px] sm:min-h-[400px] md:min-h-[500px] flex items-center bg-gray-100 cursor-pointer block group"
      >
        <img
          [ngSrc]="imageUrlService.getImageUrl(banner.imageUrl)"
          fill
          priority
          class="object-cover transition-transform duration-700 group-hover:scale-105"
        />
        <!-- Overlay removed by user request -->
      </a>
    </div>
  </div>
</section>
