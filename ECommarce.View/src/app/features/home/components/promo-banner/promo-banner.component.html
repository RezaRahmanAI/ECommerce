<section class="py-12 md:py-16 lg:py-20 bg-white" *ngIf="promoBanner$ | async as banner">
  <div class="site-container">
    <div class="mx-auto">
      <div
        class="relative overflow-hidden min-h-[300px] sm:min-h-[400px] md:min-h-[500px] flex items-center bg-primary"
      >
        <div
          class="absolute inset-0 bg-cover bg-center opacity-40 grayscale"
          [style.background-image]="'url(' + imageUrlService.getImageUrl(banner.imageUrl) + ')'"
        ></div>
        <div class="relative z-10 p-6 md:p-10 lg:p-16 xl:p-20 max-w-lg md:max-w-xl text-white">
          <span
            class="text-accent font-bold tracking-[0.3em] text-[10px] uppercase mb-4 md:mb-6 block"
            >{{ banner.subtitle }}</span
          >
          <h2
            class="text-3xl md:text-5xl lg:text-6xl font-black uppercase mb-4 md:mb-8 leading-tight tracking-tighter"
          >
            {{ banner.title }}
          </h2>
          <p
            class="text-gray-300 text-xs md:text-sm mb-6 md:mb-10 leading-relaxed uppercase tracking-widest opacity-80"
          >
            Discover exclusive collections curated for the discerning eye.
          </p>
          <a
            routerLink="/offers"
            class="inline-block px-8 md:px-12 py-3 md:py-5 border border-white/20 text-white text-[10px] uppercase tracking-[0.3em] font-bold hover:bg-white hover:text-primary transition-all duration-500"
          >
            {{ banner.buttonText || 'Explore Offers' }}
          </a>
        </div>
      </div>
    </div>
  </div>
</section>
