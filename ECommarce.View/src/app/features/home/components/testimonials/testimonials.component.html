<section class="py-12 md:py-16 lg:py-20 bg-white border-t border-gray-50">
  <div class="site-container">
    <div class="layout-content-container flex flex-col mx-auto">
      <div class="text-center mb-10 md:mb-16">
        <span
          class="text-[10px] uppercase tracking-[0.4em] text-accent font-bold mb-2 md:mb-3 block"
          >Collective Voice</span
        >
        <h2 class="text-3xl md:text-4xl lg:text-5xl font-serif italic tracking-tighter text-primary">
          Voices of Refinement
        </h2>
      </div>

      <div class="flex flex-wrap justify-center gap-8 md:gap-12 lg:gap-16">
        <div
          *ngIf="reviews.length === 0"
          class="col-span-3 text-center text-gray-400 text-sm tracking-widest uppercase"
        >
          No reviews yet.
        </div>
        <div
          *ngFor="let review of reviews"
          class="flex flex-col items-center text-center group w-full md:w-[calc(33.333%-2rem)] lg:w-[calc(33.333%-4rem)] max-w-[400px]"
        >


          <!-- Review Screenshot -->
          <div *ngIf="review.reviewImage" class="mb-8 relative max-w-[240px]">
            <div class="absolute -inset-4 bg-primary/5 rounded-[2rem] blur-xl opacity-0 group-hover:opacity-100 transition-opacity"></div>
            <img 
              [src]="imageUrlService.getImageUrl(review.reviewImage)" 
              class="w-full h-auto rounded-2xl border border-gray-100 shadow-sm hover:shadow-xl transition-all duration-500 relative z-10"
              alt="Review Proof">
          </div>

          <div class="flex flex-col items-center gap-2">
            <div>
              <p class="text-[10px] uppercase tracking-[0.3em] font-black text-primary mb-2">
                {{ review.customerName }}
              </p>

              <p class="text-text-main font-serif italic text-sm leading-relaxed mb-4 px-4 opacity-80">
                "{{ review.comment }}"
              </p>

              <div class="flex items-center justify-center gap-2 mt-2">
                <div class="flex text-yellow-400 gap-0.5 scale-90">
                  <app-icon
                    *ngFor="let star of stars"
                    name="Star"
                    className="w-3.5 h-3.5"
                    [ngClass]="{ 'fill-yellow-400': review.rating >= star }"
                  ></app-icon>
                </div>
                <span class="text-[9px] text-gray-400 font-bold uppercase tracking-widest">{{ review.date | date: 'mediumDate' }}</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
