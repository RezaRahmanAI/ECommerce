<section class="py-12 md:py-16 lg:py-20 bg-white">
  <div class="site-container">
    <div class="mx-auto">
      <div class="flex flex-col items-center mb-10 md:mb-16 text-center">
        <span class="text-[10px] uppercase tracking-[0.3em] text-text-sub font-medium mb-3 md:mb-4 block">Selected for You</span>
        <h2 class="text-3xl md:text-5xl lg:text-6xl font-serif italic text-primary mb-4 md:mb-6">Featured Collection</h2>
        <div class="w-12 md:w-16 h-px bg-accent"></div>
      </div>
      <div class="grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-4 gap-3 sm:gap-5 lg:gap-8">
        <app-product-card *ngFor="let product of products; trackBy: trackByProduct" [product]="product"></app-product-card>
      </div>
    </div>
  </div>
</section>
