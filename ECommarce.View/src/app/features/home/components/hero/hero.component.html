<section class="w-full h-screen relative overflow-hidden" (mouseenter)="stopTimer()" (mouseleave)="startTimer()">
  <!-- Loading Skeleton -->
  <div *ngIf="!isLoaded()" class="absolute inset-0 bg-gray-200 animate-pulse"></div>
  
  <!-- Main Slider - Full Width -->
  <div class="relative h-full">
    <ng-container *ngFor="let slide of mainSlides(); let i = index">
      <div
        *ngIf="i === currentSlide()"
        class="absolute inset-0 h-full w-full transition-opacity duration-500 ease-out"
        [class.opacity-100]="i === currentSlide()"
        [class.opacity-0]="i !== currentSlide()"
      >
        <!-- Background Image -->
        <img
          [src]="slide.image"
          [alt]="slide.title"
          class="absolute inset-0 w-full h-full object-cover"
          fetchpriority="high"
        />
        
        <!-- Gradient Overlay -->
        <div class="absolute inset-0 bg-gradient-to-r from-black/70 via-black/40 to-transparent"></div>

        <!-- Content -->
        <div class="relative h-full flex items-center px-8 md:px-16 lg:px-24">
          <div class="max-w-3xl">
            <span class="inline-block text-accent font-bold text-xs md:text-sm uppercase tracking-[0.3em] mb-4">
              Collection {{ currentYear }}
            </span>
            <h1 class="text-4xl md:text-6xl lg:text-7xl font-bold text-white mb-4 md:mb-6 leading-tight">
              {{ slide.title || 'Summer Collection' }}
            </h1>
            <p class="text-sm md:text-lg text-white/80 mb-8 max-w-xl">
              {{ slide.subtitle || 'Discover the latest trends in fashion.' }}
            </p>
            <a
              [routerLink]="slide.link"
              class="inline-block px-10 py-4 bg-white text-primary font-bold text-xs uppercase tracking-widest hover:bg-accent hover:text-white transition-all duration-300"
            >
              {{ slide.linkText || 'Shop Now' }}
            </a>
          </div>
        </div>
      </div>
    </ng-container>

    <!-- Navigation Arrows -->
    <button
      *ngIf="mainSlides().length > 1"
      (click)="prev()"
      class="absolute left-4 top-1/2 -translate-y-1/2 p-3 rounded-full bg-white/20 backdrop-blur text-white hover:bg-white hover:text-primary transition-all"
    >
      <lucide-icon [img]="icons.ArrowLeft" class="w-6 h-6"></lucide-icon>
    </button>
    <button
      *ngIf="mainSlides().length > 1"
      (click)="next()"
      class="absolute right-4 top-1/2 -translate-y-1/2 p-3 rounded-full bg-white/20 backdrop-blur text-white hover:bg-white hover:text-primary transition-all"
    >
      <lucide-icon [img]="icons.ArrowRight" class="w-6 h-6"></lucide-icon>
    </button>

    <!-- Pagination Dots -->
    <div *ngIf="mainSlides().length > 1" class="absolute bottom-8 left-1/2 -translate-x-1/2 flex gap-3">
      <button
        *ngFor="let slide of mainSlides(); let i = index"
        (click)="goTo(i)"
        class="rounded-full transition-all duration-300"
        [class]="i === currentSlide() ? 'w-8 h-2 bg-white' : 'w-2 h-2 bg-white/40'"
      ></button>
    </div>
  </div>
</section>
