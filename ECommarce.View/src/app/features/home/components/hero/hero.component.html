<section class="site-container py-4 md:py-6" (mouseenter)="stopTimer()" (mouseleave)="startTimer()">
  <div class="grid grid-cols-1 lg:grid-cols-12 gap-4 md:gap-5 h-full min-h-[35vh] sm:min-h-[45vh] md:min-h-[65vh] lg:min-h-[70vh] xl:min-h-[75vh]">
    
    <!-- Left: Main Slider (75%) -->
    <div class="lg:col-span-12  xl:col-span-12 relative rounded-2xl md:rounded-3xl overflow-hidden bg-supporting group shadow-lg h-full min-h-[30vh] sm:min-h-[40vh] md:min-h-[60vh] lg:min-h-[70vh] xl:min-h-[75vh]">
      <ng-container *ngFor="let slide of mainSlides; let i = index">
        <div
          *ngIf="i === currentSlide"
          [@slideSlide]="{
            value: i === currentSlide,
            params: {
              enterStart: direction === 'next' ? 'translateX(100%)' : 'translateX(-100%)',
              leaveEnd: direction === 'next' ? 'translateX(-100%)' : 'translateX(100%)'
            }
          }"
          class="absolute inset-0 h-full w-full"
        >
          <!-- Background Image -->
          <img
            [ngSrc]="imageUrlService.getImageUrl(slide.image, 1200)"
            priority
            fill
            class="object-cover transition-transform duration-[12000ms] ease-out"
            [ngClass]="{ 'scale-110': i === currentSlide }"
          />

          <!-- Clickable Background Area -->
          <a
            [routerLink]="slide.linkUrl"
            class="absolute inset-0 h-full w-full z-10 cursor-pointer"
          >
            <!-- Content Overlay Removed by User Request -->
            <div class="relative h-full flex items-center p-4 sm:p-6 md:p-10 lg:p-12 xl:p-16">
              <!-- Overlay content removed -->
            </div>
          </a>
        </div>
      </ng-container>

      <!-- Navigation Arrows -->
      <button
        (click)="prev()"
        class="absolute left-2 sm:left-4 md:left-6 top-1/2 -translate-y-1/2 p-2 sm:p-3 rounded-full bg-white/20 backdrop-blur-md text-white border border-white/30 opacity-0 group-hover:opacity-100 transition-all duration-500 hover:bg-white hover:text-primary"
      >
        <app-icon name="ArrowLeft" className="w-5 h-5 text-primary"></app-icon>
      </button>
      <button
        (click)="next()"
        class="absolute right-2 sm:right-4 md:right-6 top-1/2 -translate-y-1/2 p-2 sm:p-3 rounded-full bg-white/20 backdrop-blur-md text-white border border-white/30 opacity-0 group-hover:opacity-100 transition-all duration-500 hover:bg-white hover:text-primary"
      >
        <app-icon name="ArrowRight" className="w-5 h-5 text-primary"></app-icon>
      </button>

      <!-- Pagination Dots -->
      <div class="absolute bottom-3 sm:bottom-5 md:bottom-8 left-1/2 -translate-x-1/2 flex gap-2 sm:gap-3 z-20" *ngIf="mainSlides.length > 1">
        <button
          *ngFor="let slide of mainSlides; let i = index"
          (click)="goTo(i)"
          class="h-2 rounded-full transition-all duration-500"
          [ngClass]="i === currentSlide ? 'w-8 bg-accent' : 'w-2 bg-white/40 hover:bg-white/60'"
        ></button>
      </div>
    </div>
