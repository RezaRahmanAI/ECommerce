<div class="p-6 bg-slate-50 dark:bg-slate-900 min-h-screen">
  <div class="max-w-5xl mx-auto">
    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
      <div class="flex items-center gap-4">
        <a routerLink="/admin/adult-products" 
           class="p-2 bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-400 hover:text-primary transition-colors">
          <lucide-icon [name]="icons.ChevronLeft" class="w-6 h-6"></lucide-icon>
        </a>
        <div>
          <h1 class="text-2xl font-bold text-slate-900 dark:text-white">
            {{ isEditMode ? 'Edit' : 'Create' }} Adult Product
          </h1>
          <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">
            Fill in the details for the landing page product.
          </p>
        </div>
      </div>
      
      <button (click)="save()"
              [disabled]="form.invalid || isSaving"
              class="inline-flex items-center gap-2 bg-primary hover:bg-primary/90 text-white px-6 py-2.5 rounded-xl font-semibold transition-all shadow-lg shadow-primary/20 hover:shadow-primary/40 active:scale-[0.98] disabled:opacity-50 disabled:pointer-events-none">
        <lucide-icon *ngIf="!isSaving" [name]="icons.Check" class="w-5 h-5"></lucide-icon>
        <div *ngIf="isSaving" class="w-5 h-5 border-2 border-white/20 border-t-white rounded-full animate-spin"></div>
        {{ isSaving ? 'Saving...' : (isEditMode ? 'Update Product' : 'Create Product') }}
      </button>
    </div>

    <!-- Form Content -->
    <form [formGroup]="form" class="space-y-8">
      
      <!-- Landing Page Details -->
      <div class="bg-white dark:bg-slate-800 rounded-2xl p-8 shadow-sm border border-slate-200 dark:border-slate-700">
        <h2 class="text-xl font-bold text-slate-900 dark:text-white mb-8 flex items-center gap-3">
          <span class="w-1.5 h-6 bg-red-500 rounded-full"></span>
          Landing Page Details
        </h2>
        
        <div class="space-y-6">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-2">
              <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Headline</label>
              <input formControlName="headline"
                     type="text"
                     placeholder="e.g. Get the best results..."
                     class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-slate-900 dark:text-white" />
            </div>

            <div class="space-y-2">
              <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Slug (URL)</label>
              <input formControlName="slug"
                     type="text"
                     placeholder="e.g. tono-him"
                     class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-slate-900 dark:text-white" />
            </div>
          </div>
          
          <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="space-y-2">
              <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Price (Regular)</label>
              <input formControlName="price"
                     type="number"
                     placeholder="0.00"
                     class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-slate-900 dark:text-white" />
            </div>

            <div class="space-y-2">
              <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Compare at Price</label>
              <input formControlName="compareAtPrice"
                     type="number"
                     placeholder="0.00"
                     class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-slate-900 dark:text-white" />
            </div>

            <div class="space-y-2 flex flex-col justify-center">
              <label class="text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Display Status</label>
              <div class="flex items-center gap-3">
                <label class="relative inline-flex cursor-pointer items-center">
                  <input type="checkbox" formControlName="isActive" class="peer sr-only">
                  <div class="peer h-6 w-11 rounded-full bg-slate-200 dark:bg-slate-700 after:absolute after:left-[2px] after:top-[2px] after:h-5 after:w-5 after:rounded-full after:border after:border-slate-300 after:bg-white after:transition-all after:content-[''] peer-checked:bg-primary peer-checked:after:translate-x-full peer-checked:after:border-white peer-focus:outline-none transition-all"></div>
                </label>
                <span class="text-sm text-slate-600 dark:text-slate-400 font-medium">
                  {{ form.get('isActive')?.value ? 'Active' : 'Draft' }}
                </span>
              </div>
            </div>
          </div>

            <div class="space-y-2">
              <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Subtitle / Details (Rich Text)</label>
              <div class="border border-slate-200 dark:border-slate-700 rounded-xl overflow-hidden">
                <!-- Toolbar -->
                <div class="flex items-center gap-1 p-2 bg-slate-50 dark:bg-slate-900/50 border-b border-slate-200 dark:border-slate-700">
                  <button type="button" (click)="applyFormatting('bold', 'subtitle', subtitleField)" class="p-2 hover:bg-white dark:hover:bg-slate-800 rounded-lg transition-colors text-slate-600 dark:text-slate-400" title="Bold"><lucide-icon [name]="icons.Bold" class="w-4 h-4"></lucide-icon></button>
                  <button type="button" (click)="applyFormatting('italic', 'subtitle', subtitleField)" class="p-2 hover:bg-white dark:hover:bg-slate-800 rounded-lg transition-colors text-slate-600 dark:text-slate-400" title="Italic"><lucide-icon [name]="icons.Italic" class="w-4 h-4"></lucide-icon></button>
                  <button type="button" (click)="applyFormatting('underline', 'subtitle', subtitleField)" class="p-2 hover:bg-white dark:hover:bg-slate-800 rounded-lg transition-colors text-slate-600 dark:text-slate-400" title="Underline"><lucide-icon [name]="icons.Underline" class="w-4 h-4"></lucide-icon></button>
                  <div class="w-px h-4 bg-slate-300 dark:bg-slate-600 mx-1"></div>
                  <button type="button" (click)="applyFormatting('list', 'subtitle', subtitleField)" class="p-2 hover:bg-white dark:hover:bg-slate-800 rounded-lg transition-colors text-slate-600 dark:text-slate-400" title="Bullet List"><lucide-icon [name]="icons.List" class="w-4 h-4"></lucide-icon></button>
                  <button type="button" (click)="applyFormatting('ordered-list', 'subtitle', subtitleField)" class="p-2 hover:bg-white dark:hover:bg-slate-800 rounded-lg transition-colors text-slate-600 dark:text-slate-400" title="Numbered List"><lucide-icon [name]="icons.ListOrdered" class="w-4 h-4"></lucide-icon></button>
                  <button type="button" (click)="applyFormatting('clear', 'subtitle', subtitleField)" class="p-2 hover:bg-white dark:hover:bg-slate-800 rounded-lg transition-colors text-slate-600 dark:text-slate-400 ml-auto" title="Clear Formatting"><lucide-icon [name]="icons.Eraser" class="w-4 h-4"></lucide-icon></button>
                </div>
                <textarea #subtitleField
                          formControlName="subtitle"
                          placeholder="e.g. Get the best results with our premium product"
                          rows="4"
                          class="w-full px-4 py-3 bg-white dark:bg-slate-800 border-none focus:ring-0 transition-all text-slate-900 dark:text-white resize-none"></textarea>
              </div>
            </div>
          </div>
      </div>

      <!-- Main Content Grid -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        
        <!-- Benefits Section -->
        <div class="bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-sm border border-slate-200 dark:border-slate-700">
          <div class="space-y-4">
            <div class="space-y-2">
              <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Benefits Section Title</label>
              <input formControlName="benefitsTitle"
                     type="text"
                     class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-slate-900 dark:text-white" />
            </div>

            <div class="border border-slate-200 dark:border-slate-700 rounded-xl overflow-hidden mt-4">
              <div class="flex items-center gap-1 p-2 bg-slate-50 dark:bg-slate-900/50 border-b border-slate-200 dark:border-slate-700">
                <button type="button" (click)="applyFormatting('bold', 'benefitsContent', benefitsContentField)" class="p-2 hover:bg-white dark:hover:bg-slate-800 rounded-lg transition-colors text-slate-600 dark:text-slate-400"><lucide-icon [name]="icons.Bold" class="w-4 h-4"></lucide-icon></button>
                <button type="button" (click)="applyFormatting('italic', 'benefitsContent', benefitsContentField)" class="p-2 hover:bg-white dark:hover:bg-slate-800 rounded-lg transition-colors text-slate-600 dark:text-slate-400"><lucide-icon [name]="icons.Italic" class="w-4 h-4"></lucide-icon></button>
                <button type="button" (click)="applyFormatting('list', 'benefitsContent', benefitsContentField)" class="p-2 hover:bg-white dark:hover:bg-slate-800 rounded-lg transition-colors text-slate-600 dark:text-slate-400"><lucide-icon [name]="icons.List" class="w-4 h-4"></lucide-icon></button>
              </div>
              <textarea #benefitsContentField
                        formControlName="benefitsContent"
                        placeholder="Benefits Content..."
                        rows="6"
                        class="w-full px-4 py-3 bg-white dark:bg-slate-800 border-none focus:ring-0 transition-all text-slate-900 dark:text-white resize-none"></textarea>
            </div>
          </div>
        </div>

        <!-- How to Use Section -->
        <div class="bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-sm border border-slate-200 dark:border-slate-700">
          <div class="space-y-4">
            <div class="space-y-2">
              <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">How to Use Title</label>
              <input formControlName="usageTitle"
                     type="text"
                     class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-slate-900 dark:text-white" />
            </div>

            <div class="border border-slate-200 dark:border-slate-700 rounded-xl overflow-hidden mt-4">
              <div class="flex items-center gap-1 p-2 bg-slate-50 dark:bg-slate-900/50 border-b border-slate-200 dark:border-slate-700">
                <button type="button" (click)="applyFormatting('bold', 'usageContent', usageContentField)" class="p-2 hover:bg-white dark:hover:bg-slate-800 rounded-lg transition-colors text-slate-600 dark:text-slate-400"><lucide-icon [name]="icons.Bold" class="w-4 h-4"></lucide-icon></button>
                <button type="button" (click)="applyFormatting('italic', 'usageContent', usageContentField)" class="p-2 hover:bg-white dark:hover:bg-slate-800 rounded-lg transition-colors text-slate-600 dark:text-slate-400"><lucide-icon [name]="icons.Italic" class="w-4 h-4"></lucide-icon></button>
                <button type="button" (click)="applyFormatting('list', 'usageContent', usageContentField)" class="p-2 hover:bg-white dark:hover:bg-slate-800 rounded-lg transition-colors text-slate-600 dark:text-slate-400"><lucide-icon [name]="icons.List" class="w-4 h-4"></lucide-icon></button>
              </div>
              <textarea #usageContentField
                        formControlName="usageContent"
                        placeholder="Usage Content..."
                        rows="6"
                        class="w-full px-4 py-3 bg-white dark:bg-slate-800 border-none focus:ring-0 transition-all text-slate-900 dark:text-white resize-none"></textarea>
            </div>
          </div>
        </div>

        <!-- Side Effects Section -->
        <div class="bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-sm border border-slate-200 dark:border-slate-700">
          <div class="space-y-4">
            <div class="space-y-2">
              <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Side Effects Title</label>
              <input formControlName="sideEffectsTitle"
                     type="text"
                     class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-slate-900 dark:text-white" />
            </div>

            <div class="border border-slate-200 dark:border-slate-700 rounded-xl overflow-hidden mt-4">
              <div class="flex items-center gap-1 p-2 bg-slate-50 dark:bg-slate-900/50 border-b border-slate-200 dark:border-slate-700">
                <button type="button" (click)="applyFormatting('bold', 'sideEffectsContent', sideEffectsContentField)" class="p-2 hover:bg-white dark:hover:bg-slate-800 rounded-lg transition-colors text-slate-600 dark:text-slate-400"><lucide-icon [name]="icons.Bold" class="w-4 h-4"></lucide-icon></button>
                <button type="button" (click)="applyFormatting('italic', 'sideEffectsContent', sideEffectsContentField)" class="p-2 hover:bg-white dark:hover:bg-slate-800 rounded-lg transition-colors text-slate-600 dark:text-slate-400"><lucide-icon [name]="icons.Italic" class="w-4 h-4"></lucide-icon></button>
                <button type="button" (click)="applyFormatting('list', 'sideEffectsContent', sideEffectsContentField)" class="p-2 hover:bg-white dark:hover:bg-slate-800 rounded-lg transition-colors text-slate-600 dark:text-slate-400"><lucide-icon [name]="icons.List" class="w-4 h-4"></lucide-icon></button>
              </div>
              <textarea #sideEffectsContentField
                        formControlName="sideEffectsContent"
                        placeholder="Side Effects Content..."
                        rows="6"
                        class="w-full px-4 py-3 bg-white dark:bg-slate-800 border-none focus:ring-0 transition-all text-slate-900 dark:text-white resize-none"></textarea>
            </div>
          </div>
        </div>

        <!-- Media Section -->
        <div class="bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-sm border border-slate-200 dark:border-slate-700">
          <label class="text-sm font-semibold text-slate-700 dark:text-slate-300 mb-4 block">Product Image</label>
          <div class="relative group aspect-square rounded-2xl overflow-hidden bg-slate-50 dark:bg-slate-900 border-2 border-dashed border-slate-200 dark:border-slate-700 hover:border-primary transition-colors flex items-center justify-center">
            
            <ng-container *ngIf="imagePreview; else noImage">
              <img [src]="imagePreview" class="w-full h-full object-contain p-4" alt="Preview">
              <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-3">
                <button (click)="fileInput.click()" type="button" class="px-4 py-2 bg-white text-slate-900 rounded-lg hover:bg-primary hover:text-white transition-all font-semibold">
                  Change Image
                </button>
                <button (click)="removeImage()" type="button" class="p-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-all">
                  <lucide-icon [name]="icons.X" class="w-5 h-5"></lucide-icon>
                </button>
              </div>
            </ng-container>

            <ng-template #noImage>
              <div (click)="fileInput.click()" class="text-center cursor-pointer">
                <div class="w-16 h-16 bg-white dark:bg-slate-800 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-slate-200 dark:border-slate-700 shadow-sm">
                  <lucide-icon [name]="icons.Upload" class="w-8 h-8 text-slate-400"></lucide-icon>
                </div>
                <p class="text-slate-500 font-medium">Upload image</p>
              </div>
            </ng-template>

            <input #fileInput type="file" (change)="onFileSelected($event)" accept="image/*" class="hidden">
          </div>
        </div>

      </div>

    </form>
  </div>
</div>
