<div class="p-6 bg-slate-50 dark:bg-slate-900 min-h-screen">
  <div class="max-w-7xl mx-auto">
    <!-- Header -->
    <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
      <div>
        <h1 class="text-3xl font-bold text-slate-900 dark:text-white flex items-center gap-3">
          <lucide-icon [name]="icons.Package" class="w-8 h-8 text-primary"></lucide-icon>
          Adult Products
        </h1>
        <p class="text-slate-500 dark:text-slate-400 mt-1">Manage landing page products for adult category.</p>
      </div>
      <a routerLink="new"
         class="inline-flex items-center gap-2 bg-primary hover:bg-primary/90 text-white px-5 py-2.5 rounded-xl font-medium transition-all shadow-sm shadow-primary/20 hover:shadow-primary/40 active:scale-[0.98]">
        <lucide-icon [name]="icons.Plus" class="w-5 h-5"></lucide-icon>
        Add Product
      </a>
    </div>

    <!-- Filters & Search -->
    <div class="bg-white dark:bg-slate-800 rounded-2xl p-4 shadow-sm border border-slate-200 dark:border-slate-700 mb-6 flex flex-col md:flex-row gap-4 items-center">
      <div class="relative flex-1 w-full">
        <lucide-icon [name]="icons.Search" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></lucide-icon>
        <input [formControl]="searchControl"
               type="text"
               placeholder="Search products..."
               class="w-full pl-12 pr-4 py-2.5 bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-slate-900 dark:text-white" />
      </div>
    </div>

    <!-- Products Grid -->
    <div *ngIf="!isLoading; else loadingTemplate">
      <div *ngIf="filteredProducts.length > 0; else emptyTemplate" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
        <div *ngFor="let product of filteredProducts" 
             class="group bg-white dark:bg-slate-800 rounded-2xl overflow-hidden border border-slate-200 dark:border-slate-700 shadow-sm hover:shadow-xl transition-all duration-300">
          
          <!-- Image -->
          <div class="relative h-48 overflow-hidden aspect-square flex items-center justify-center bg-slate-100 dark:bg-slate-900">
            <img [src]="imageUrlService.getImageUrl(product.imgUrl)" 
                 [alt]="product.headline"
                 class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" />
            
            <!-- Actions Overlay -->
            <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-3">
              <a [routerLink]="['/adult-lp', product.slug]" 
                 target="_blank"
                 class="p-2.5 bg-white text-slate-900 rounded-full hover:bg-amber-500 hover:text-white transition-all transform translate-y-4 group-hover:translate-y-0 duration-300">
                <lucide-icon [name]="icons.Eye" class="w-5 h-5"></lucide-icon>
              </a>
              <a [routerLink]="['edit', product.id]" 
                 class="p-2.5 bg-white text-slate-900 rounded-full hover:bg-primary hover:text-white transition-all transform translate-y-4 group-hover:translate-y-0 duration-300 delay-75">
                <lucide-icon [name]="icons.Edit" class="w-5 h-5"></lucide-icon>
              </a>
              <button (click)="deleteProduct(product)"
                      class="p-2.5 bg-white text-red-600 rounded-full hover:bg-red-600 hover:text-white transition-all transform translate-y-4 group-hover:translate-y-0 duration-300 delay-150">
                <lucide-icon [name]="icons.Trash2" class="w-5 h-5"></lucide-icon>
              </button>
            </div>
          </div>

          <!-- Content -->
          <div class="p-4">
            <h3 class="font-bold text-slate-900 dark:text-white line-clamp-1 group-hover:text-primary transition-colors">{{ product.headline }}</h3>
            <p class="text-sm text-slate-500 dark:text-slate-400 mt-1 line-clamp-2 min-h-[2.5rem]">{{ product.subtitle }}</p>
            
            <div class="mt-4 pt-4 border-t border-slate-100 dark:border-slate-700 flex items-center justify-between">
              <span class="text-xs text-slate-400">ID: #{{ product.id }}</span>
              <span class="text-xs text-slate-400">{{ product.createdAt | date:'shortDate' }}</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Loading State -->
    <ng-template #loadingTemplate>
      <div class="flex flex-col items-center justify-center py-20">
        <div class="w-12 h-12 border-4 border-primary/20 border-t-primary rounded-full animate-spin"></div>
        <p class="mt-4 text-slate-500 font-medium">Loading items...</p>
      </div>
    </ng-template>

    <!-- Empty State -->
    <ng-template #emptyTemplate>
      <div class="bg-white dark:bg-slate-800 rounded-3xl p-12 text-center border border-dashed border-slate-300 dark:border-slate-600 shadow-inner">
        <div class="w-20 h-20 bg-slate-50 dark:bg-slate-900 rounded-2xl flex items-center justify-center mx-auto mb-6">
          <lucide-icon [name]="icons.Package" class="w-10 h-10 text-slate-300"></lucide-icon>
        </div>
        <h3 class="text-xl font-bold text-slate-900 dark:text-white">No items found</h3>
        <p class="text-slate-500 dark:text-slate-400 mt-2 max-w-sm mx-auto">We couldn't find any adult products matching your search criteria.</p>
        <button (click)="searchControl.setValue('')" 
                class="mt-6 text-primary font-semibold hover:underline">Clear search filters</button>
      </div>
    </ng-template>
  </div>
</div>
