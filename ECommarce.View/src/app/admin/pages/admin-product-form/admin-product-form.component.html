<form
  class="mx-auto flex w-full max-w-7xl flex-1 flex-col p-6"
  [formGroup]="form"
  (ngSubmit)="saveProduct()"
>
  <!-- Page Heading & Global Actions -->
  <div
    class="mb-8 flex flex-col justify-between gap-4 sm:flex-row sm:items-center"
  >
    <div>
      <div
        class="flex items-center gap-2 text-sm text-text-secondary-light dark:text-text-secondary-dark mb-1"
      >
        <span>Products</span>
        <lucide-icon
          [img]="icons.ChevronRight"
          class="w-3.5 h-3.5"
        ></lucide-icon>
        <span
          class="font-medium text-text-main-light dark:text-text-main-dark"
          >{{ isEditMode ? "Edit" : "Add New" }}</span
        >
      </div>
      <h1
        class="text-3xl font-bold text-text-main-light dark:text-text-main-dark"
      >
        {{ pageTitle }}
      </h1>
    </div>
    <div class="flex gap-3">
      <button
        class="flex h-10 items-center justify-center rounded-lg border border-border-light dark:border-border-dark bg-surface-light dark:bg-surface-dark px-4 text-sm font-semibold text-text-main-light dark:text-text-main-dark hover:bg-gray-50 dark:hover:bg-gray-800"
        type="button"
        (click)="discard()"
      >
        Discard
      </button>
      <button
        class="flex h-10 items-center justify-center gap-2 rounded-lg bg-primary px-6 text-sm font-bold text-white hover:bg-[#083a4a] shadow-lg shadow-primary/20"
        type="submit"
      >
        <lucide-icon [img]="icons.Check" class="w-5 h-5"></lucide-icon>
        {{ isEditMode ? "Update Product" : "Save Product" }}
      </button>
    </div>
  </div>
  <div class="grid grid-cols-1 gap-8 lg:grid-cols-3">
    <!-- Left Column (Main Info) -->
    <div class="flex flex-col gap-8 lg:col-span-2">
      <!-- General Information Card -->
      <div
        class="rounded-xl border border-border-light dark:border-border-dark bg-surface-light dark:bg-surface-dark p-6 shadow-sm"
      >
        <h2
          class="mb-4 text-lg font-bold text-text-main-light dark:text-text-main-dark"
        >
          General Information
        </h2>
        <div class="flex flex-col gap-5">
          <label class="flex flex-col gap-1.5">
            <span
              class="text-sm font-medium text-text-main-light dark:text-text-main-dark"
              >Product Name</span
            >
            <input
              class="w-full rounded-lg border border-border-light dark:border-border-dark bg-background-light dark:bg-background-dark px-4 py-2.5 text-text-main-light dark:text-text-main-dark placeholder:text-text-secondary-light focus:border-primary focus:ring-1 focus:ring-primary"
              placeholder="e.g. Premium Silk Hijab - Midnight Blue"
              type="text"
              formControlName="name"
            />
          </label>
        </div>
      </div>

      <!-- Landing Page Details (Permanent) -->
      <div
        class="rounded-xl border border-[#e63b3b]/30 bg-white dark:bg-surface-dark p-6 shadow-sm shadow-[#e63b3b]/10"
        formGroupName="landingPage"
      >
        <div class="mb-4 flex items-center gap-2">
          <div class="h-5 w-1 bg-[#e63b3b] rounded-full"></div>
          <h2
            class="text-lg font-bold text-text-main-light dark:text-text-main-dark"
          >
            Landing Page Details
          </h2>
        </div>
        
        <div class="flex flex-col gap-5">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <label class="flex flex-col gap-1.5">
              <span class="text-sm font-medium text-text-main-light dark:text-text-main-dark">Headline</span>
              <input
                class="w-full rounded-lg border border-border-light dark:border-border-dark bg-background-light dark:bg-background-dark px-4 py-2.5 text-text-main-light dark:text-text-main-dark placeholder:text-text-secondary-light focus:border-[#e63b3b] focus:ring-1 focus:ring-[#e63b3b]"
                placeholder="e.g. Get the best results with our premium product"
                type="text"
                formControlName="headline"
              />
            </label>

            <label class="flex flex-col gap-1.5">
              <span class="text-sm font-medium text-text-main-light dark:text-text-main-dark">Video URL (Optional)</span>
              <input
                class="w-full rounded-lg border border-border-light dark:border-border-dark bg-background-light dark:bg-background-dark px-4 py-2.5 text-text-main-light dark:text-text-main-dark placeholder:text-text-secondary-light focus:border-[#e63b3b] focus:ring-1 focus:ring-[#e63b3b]"
                placeholder="e.g. https://youtube.com/..."
                type="text"
                formControlName="videoUrl"
              />
            </label>
          </div>

          <label class="flex flex-col gap-1.5">
            <span class="text-sm font-medium text-text-main-light dark:text-text-main-dark">Theme Color</span>
            <div class="flex gap-2">
              <input
                class="h-10 w-20 rounded-lg border border-border-light dark:border-border-dark bg-background-light dark:bg-background-dark p-1"
                type="color"
                formControlName="themeColor"
              />
              <input
                class="flex-1 rounded-lg border border-border-light dark:border-border-dark bg-background-light dark:bg-background-dark px-4 py-2 text-sm"
                type="text"
                formControlName="themeColor"
                placeholder="#1a1a1a"
              />
            </div>
          </label>

          <div class="flex flex-col gap-1.5">
            <span class="text-sm font-medium text-text-main-light dark:text-text-main-dark">Subtitle / Details (Rich Text)</span>
            <quill-editor
              class="block w-full"
              [modules]="quillModules"
              placeholder="e.g. Get the best results with our premium product"
              formControlName="subtitle"
            ></quill-editor>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4 border-t border-border-light dark:border-border-dark pt-5 mt-2">
            <!-- Benefits -->
            <div class="space-y-3">
              <label class="flex flex-col gap-1.5">
                <span class="text-sm font-semibold text-text-main-light dark:text-text-main-dark">Benefits Section</span>
                <input
                  class="w-full rounded-lg border border-border-light dark:border-border-dark bg-background-light dark:bg-background-dark px-3 py-2 text-sm"
                  placeholder="Benefits Title"
                  type="text"
                  formControlName="benefitsTitle"
                />
              </label>
              <quill-editor
                class="block w-full"
                [modules]="quillModules"
                placeholder="Benefits Content..."
                formControlName="benefitsContent"
              ></quill-editor>
            </div>

            <!-- Usage -->
            <div class="space-y-3">
              <label class="flex flex-col gap-1.5">
                <span class="text-sm font-semibold text-text-main-light dark:text-text-main-dark">How to Use</span>
                <input
                  class="w-full rounded-lg border border-border-light dark:border-border-dark bg-background-light dark:bg-background-dark px-3 py-2 text-sm"
                  placeholder="Usage Title"
                  type="text"
                  formControlName="usageTitle"
                />
              </label>
              <quill-editor
                class="block w-full"
                [modules]="quillModules"
                placeholder="Usage Content..."
                formControlName="usageContent"
              ></quill-editor>
            </div>

            <!-- Side Effects -->
            <div class="space-y-3">
              <label class="flex flex-col gap-1.5">
                <span class="text-sm font-semibold text-text-main-light dark:text-text-main-dark">Side Effects</span>
                <input
                  class="w-full rounded-lg border border-border-light dark:border-border-dark bg-background-light dark:bg-background-dark px-3 py-2 text-sm"
                  placeholder="Side Effects Title"
                  type="text"
                  formControlName="sideEffectsTitle"
                />
              </label>
              <quill-editor
                class="block w-full"
                [modules]="quillModules"
                placeholder="Side Effects Content..."
                formControlName="sideEffectsContent"
              ></quill-editor>
            </div>

            <!-- Reviews -->
            <div class="space-y-3">
              <label class="flex flex-col gap-1.5">
                <span class="text-sm font-semibold text-text-main-light dark:text-text-main-dark">Customer Reviews</span>
                <input
                  class="w-full rounded-lg border border-border-light dark:border-border-dark bg-background-light dark:bg-background-dark px-3 py-2 text-sm"
                  placeholder="Reviews Title"
                  type="text"
                  formControlName="reviewsTitle"
                />
              </label>
            </div>
          </div>
        </div>
      </div>

      <!-- Variants Card -->
      <div class="rounded-xl border border-border-light dark:border-border-dark bg-surface-light dark:bg-surface-dark p-6 shadow-sm">
        <div class="mb-4 flex items-center justify-between">
          <h2 class="text-lg font-bold text-text-main-light dark:text-text-main-dark">Variants</h2>
        </div>
        
        <div formGroupName="variants">
          <!-- Sizes & Stock -->
          <div class="mb-6">
            <div class="flex items-center justify-between mb-3">
              <h3 class="text-sm font-semibold text-text-main-light dark:text-text-main-dark uppercase tracking-wider">Sizes & Stock</h3>
              <button type="button" (click)="addSize()" class="flex items-center gap-1.5 text-xs font-bold text-primary hover:text-primary/80 transition-colors">
                <lucide-icon [img]="icons.PlusCircle" class="w-3.5 h-3.5"></lucide-icon>
                Add Size
              </button>
            </div>
            
            <div formArrayName="sizes" class="space-y-3">
              <div *ngFor="let size of sizesArray.controls; let i = index" [formGroupName]="i" class="flex gap-3 items-start animate-in fade-in slide-in-from-top-2 duration-200">
                <div class="flex-1">
                  <input
                    type="text"
                    formControlName="label"
                    placeholder="e.g. XL, 42, 100ml"
                    class="w-full rounded-lg border border-border-light dark:border-border-dark bg-background-light dark:bg-background-dark px-3 py-2 text-sm focus:border-primary focus:ring-1 focus:ring-primary"
                  />
                </div>
                <div class="w-32">
                  <div class="relative">
                    <input
                      type="number"
                      formControlName="stock"
                      placeholder="Stock"
                      class="w-full rounded-lg border border-border-light dark:border-border-dark bg-background-light dark:bg-background-dark px-3 py-2 text-sm focus:border-primary focus:ring-1 focus:ring-primary no-spin"
                    />
                    <span class="absolute right-3 top-1/2 -translate-y-1/2 text-[10px] font-bold text-text-secondary-light uppercase">Qty</span>
                  </div>
                </div>
                <button 
                  *ngIf="sizesArray.length > 1"
                  type="button" 
                  (click)="removeSize(i)"
                  class="mt-2 text-text-secondary-light hover:text-red-500 transition-colors"
                >
                  <lucide-icon [img]="icons.Trash2" class="w-4 h-4"></lucide-icon>
                </button>
              </div>
            </div>
          </div>

          <!-- Color Tags (Optional display) -->
          <div>
            <div class="flex items-center justify-between mb-3 border-t border-border-light dark:border-border-dark pt-5">
              <h3 class="text-sm font-semibold text-text-main-light dark:text-text-main-dark uppercase tracking-wider">Color Variations</h3>
              <button type="button" (click)="addColor()" class="flex items-center gap-1.5 text-xs font-bold text-primary hover:text-primary/80 transition-colors">
                <lucide-icon [img]="icons.PlusCircle" class="w-3.5 h-3.5"></lucide-icon>
                Add Color
              </button>
            </div>
            
            <div formArrayName="colors" class="flex flex-wrap gap-2">
              <div *ngFor="let color of colorsArray.controls; let i = index" [formGroupName]="i" class="group relative flex items-center gap-2 rounded-full border border-border-light dark:border-border-dark bg-background-light dark:bg-background-dark pl-3 pr-8 py-1.5 animate-in zoom-in duration-200">
                <input
                  type="text"
                  formControlName="name"
                  placeholder="Color name"
                  class="w-20 bg-transparent text-xs font-medium focus:outline-none"
                />
                <button 
                  *ngIf="colorsArray.length > 1"
                  type="button" 
                  (click)="removeColor(i)"
                  class="absolute right-2 text-text-secondary-light hover:text-red-500 transition-colors"
                >
                  <lucide-icon [img]="icons.Trash2" class="w-3 h-3"></lucide-icon>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Media Card -->
      <div
        class="rounded-xl border border-border-light dark:border-border-dark bg-surface-light dark:bg-surface-dark p-6 shadow-sm"
      >
        <div class="mb-4 flex items-center justify-between">
          <h2
            class="text-lg font-bold text-text-main-light dark:text-text-main-dark"
          >
            Media
          </h2>
          <button
            class="text-sm font-medium text-primary hover:underline"
            type="button"
            (click)="addFromUrl()"
          >
            Add from URL
          </button>
        </div>
        <div
          class="rounded-lg border-2 border-dashed border-border-light dark:border-border-dark bg-background-light dark:bg-background-dark p-8 transition-colors hover:border-primary/50"
          (dragover)="handleDragOver($event)"
          (drop)="handleDrop($event)"
          (click)="fileInput.click()"
        >
          <div class="flex flex-col items-center justify-center text-center">
            <div
              class="mb-3 rounded-full bg-surface-light dark:bg-surface-dark p-3 shadow-sm"
            >
              <lucide-icon
                [img]="icons.Upload"
                class="w-8 h-8 text-primary"
              ></lucide-icon>
            </div>
            <p
              class="text-sm font-medium text-text-main-light dark:text-text-main-dark"
            >
              <span class="text-primary cursor-pointer hover:underline"
                >Click to upload</span
              >
              or drag and drop
            </p>
            <p class="mt-1 text-xs text-text-secondary-light">
              SVG, PNG, JPG or GIF (max. 800x400px)
            </p>
          </div>
          <input
            #fileInput
            class="hidden"
            type="file"
            multiple
            (change)="handleFilesSelected($event)"
          />
        </div>
        <div class="mt-6 space-y-4" formArrayName="mediaItems">
          <div
            *ngFor="
              let media of mediaItemsArray.controls;
              let mediaIndex = index;
              trackBy: trackByIndex
            "
            class="flex flex-col gap-4 rounded-lg border border-border-light dark:border-border-dark bg-background-light dark:bg-background-dark p-4"
            [formGroupName]="mediaIndex"
          >
            <div class="flex flex-col gap-4 sm:flex-row">
              <div
                class="relative h-36 w-full overflow-hidden rounded-lg border border-border-light dark:border-border-dark bg-white sm:w-40"
              >
                <img
                  [alt]="media.get('alt')?.value || 'Product media'"
                  class="h-full w-full object-cover"
                  [src]="imageUrlService.getImageUrl(media.get('url')?.value)"
                />
                <div
                  *ngIf="media.get('type')?.value === 'video'"
                  class="absolute inset-0 flex items-center justify-center bg-black/40"
                >
                  <lucide-icon
                    [img]="icons.PlayCircle"
                    class="w-10 h-10 text-white"
                  ></lucide-icon>
                </div>
              </div>
              <div class="flex-1 flex flex-col justify-center">
                <div class="flex items-center justify-between mb-4">
                  <label class="flex items-center gap-2 text-xs font-medium text-text-secondary-light uppercase">
                    <input
                      class="text-primary focus:ring-primary"
                      type="radio"
                      name="mainMedia"
                      [checked]="media.get('isMain')?.value"
                      (change)="setMainMedia(mediaIndex)"
                    />
                    Main media
                  </label>
                  <button
                    class="text-xs font-semibold text-red-500 hover:underline"
                    type="button"
                    (click)="removeMediaItem(mediaIndex)"
                  >
                    Remove
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Right Column (Organization & Settings) -->
    <div class="flex flex-col gap-8 lg:col-span-1">
      <!-- Pricing Card (Base) -->
      <div
        class="rounded-xl border border-border-light dark:border-border-dark bg-surface-light dark:bg-surface-dark p-6 shadow-sm"
      >
        <h2
          class="mb-4 text-lg font-bold text-text-main-light dark:text-text-main-dark"
        >
          Pricing
        </h2>
        <div class="flex flex-col gap-5">
          <label class="flex flex-col gap-1.5">
            <span
              class="text-sm font-medium text-text-main-light dark:text-text-main-dark"
              >Price (Main)</span
            >
            <div class="relative">
              <img
                class="absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2"
                src="assets/taka.svg"
                alt="Taka"
              />
              <input
                class="w-full rounded-lg border border-border-light dark:border-border-dark bg-background-light dark:bg-background-dark py-2.5 pl-7 pr-4 text-text-main-light dark:text-text-main-dark focus:border-primary focus:ring-1 focus:ring-primary"
                placeholder="0.00"
                type="number"
                formControlName="price"
              />
            </div>
          </label>
          <label class="flex flex-col gap-1.5">
            <span
              class="text-sm font-medium text-text-main-light dark:text-text-main-dark"
              >Compare at Price (Discounted)</span
            >
            <div class="relative">
              <img
                class="absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2"
                src="assets/taka.svg"
                alt="Taka"
              />
              <input
                class="w-full rounded-lg border border-border-light dark:border-border-dark bg-background-light dark:bg-background-dark py-2.5 pl-7 pr-4 text-text-main-light dark:text-text-main-dark focus:border-primary focus:ring-1 focus:ring-primary"
                placeholder="0.00"
                type="number"
                formControlName="salePrice"
              />
            </div>
            <span class="text-xs text-text-secondary-light"
              >Higher price to show discount (e.g. 500 becomes 400).</span
            >
          </label>
        </div>
      </div>

      <!-- Status Card -->
      <div
        class="rounded-xl border border-border-light dark:border-border-dark bg-surface-light dark:bg-surface-dark p-6 shadow-sm"
      >
        <h2
          class="mb-4 text-lg font-bold text-text-main-light dark:text-text-main-dark"
        >
          Status
        </h2>
        <div class="flex items-center justify-between mb-4">
          <span
            class="text-sm font-medium text-text-main-light dark:text-text-main-dark"
            >Active</span
          >
          <label class="relative inline-flex cursor-pointer items-center">
            <input
              class="peer sr-only"
              type="checkbox"
              formControlName="statusActive"
            />
            <div
              class="peer h-6 w-11 rounded-full bg-gray-200 after:absolute after:left-[2px] after:top-[2px] after:h-5 after:w-5 after:rounded-full after:border after:border-gray-300 after:bg-white after:transition-all after:content-[''] peer-checked:bg-primary peer-checked:after:translate-x-full peer-checked:after:border-white peer-focus:outline-none dark:bg-gray-700"
            ></div>
          </label>
        </div>
      </div>
    </div>
  </div>
</form>
