<div class="max-w-[1000px] mx-auto pb-20">
  <div class="flex items-center justify-between mb-8">
    <div class="flex items-center gap-4">
      <a
        routerLink="/admin/products"
        class="w-10 h-10 rounded-full bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 flex items-center justify-center transition-colors"
      >
        <lucide-icon [img]="icons.ArrowLeft" class="w-5 h-5 text-slate-600 dark:text-slate-300"></lucide-icon>
      </a>
      <div>
        <h1 class="text-2xl font-bold text-slate-900 dark:text-white">
          Landing Page Editor
        </h1>
        <p class="text-sm text-slate-500" *ngFor="let p of [product]">
          {{ p ? p.name : 'Loading...' }}
        </p>
      </div>
    </div>
    <div class="flex items-center gap-3">
      <button
        (click)="save()"
        [disabled]="isSaving || isLoading"
        class="h-10 px-6 rounded-lg bg-primary text-white font-medium hover:bg-[#083b4b] transition-colors flex items-center gap-2 disabled:opacity-50"
      >
        <lucide-icon
          *ngIf="isSaving"
          [img]="icons.Loader2"
          class="w-4 h-4 animate-spin"
        ></lucide-icon>
        <lucide-icon
          *ngIf="!isSaving"
          [img]="icons.Save"
          class="w-4 h-4"
        ></lucide-icon>
        Save Changes
      </button>
    </div>
  </div>

  <div *ngIf="isLoading" class="flex justify-center py-20">
    <lucide-icon [img]="icons.Loader2" class="w-8 h-8 animate-spin text-primary"></lucide-icon>
  </div>

  <div *ngIf="error" class="bg-red-50 text-red-600 p-4 rounded-lg mb-6 text-sm">
    {{ error }}
  </div>

  <form *ngIf="!isLoading" [formGroup]="form" class="space-y-6">
    <!-- Basic Information -->
    <div class="bg-white dark:bg-surface-dark border border-slate-200 dark:border-slate-700 rounded-xl p-6 shadow-sm">
      <h2 class="text-lg font-bold text-slate-900 dark:text-white mb-4">Hero Section</h2>
      <div class="grid grid-cols-1 gap-6">
        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Headline *</label>
          <input
            type="text"
            formControlName="headline"
            class="w-full h-11 px-4 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-surface-dark focus:ring-primary focus:border-primary text-slate-900 dark:text-white"
            placeholder="e.g., Tono Him"
          />
          <p class="text-xs text-red-500 mt-1" *ngIf="form.controls.headline.touched && form.controls.headline.invalid">
            Headline is required.
          </p>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Subtitle / Details (Rich Text)</label>
          <quill-editor
            class="block w-full bg-white dark:bg-surface-dark"
            [modules]="quillModules"
            formControlName="subtitle"
            placeholder="Subheadline details..."
          ></quill-editor>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Theme Color</label>
          <input
            type="color"
            formControlName="themeColor"
            class="h-11 w-20 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-surface-dark focus:ring-primary focus:border-primary p-1 cursor-pointer"
          />
        </div>
      </div>
    </div>

    <!-- Benefits Section -->
    <div class="bg-white dark:bg-surface-dark border border-slate-200 dark:border-slate-700 rounded-xl p-6 shadow-sm">
      <h2 class="text-lg font-bold text-slate-900 dark:text-white mb-4">Benefits & Features</h2>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Section Title</label>
          <input
            type="text"
            formControlName="benefitsTitle"
            class="w-full h-11 px-4 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-surface-dark focus:ring-primary focus:border-primary text-slate-900 dark:text-white"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Content (HTML allowed)</label>
          <quill-editor
            class="block w-full bg-white dark:bg-surface-dark"
            [modules]="quillModules"
            formControlName="benefitsContent"
            placeholder="Benefits Content..."
          ></quill-editor>
        </div>
      </div>
    </div>

    <!-- Usage Section -->
    <div class="bg-white dark:bg-surface-dark border border-slate-200 dark:border-slate-700 rounded-xl p-6 shadow-sm">
      <h2 class="text-lg font-bold text-slate-900 dark:text-white mb-4">Usage Instructions</h2>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Section Title</label>
          <input
            type="text"
            formControlName="usageTitle"
            class="w-full h-11 px-4 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-surface-dark focus:ring-primary focus:border-primary text-slate-900 dark:text-white"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Content (HTML allowed)</label>
          <quill-editor
            class="block w-full bg-white dark:bg-surface-dark"
            [modules]="quillModules"
            formControlName="usageContent"
            placeholder="Usage Content..."
          ></quill-editor>
        </div>
      </div>
    </div>

    <!-- Side Effects Section -->
    <div class="bg-white dark:bg-surface-dark border border-slate-200 dark:border-slate-700 rounded-xl p-6 shadow-sm">
      <h2 class="text-lg font-bold text-slate-900 dark:text-white mb-4">Side Effects / Disclaimers</h2>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Section Title</label>
          <input
            type="text"
            formControlName="sideEffectsTitle"
            class="w-full h-11 px-4 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-surface-dark focus:ring-primary focus:border-primary text-slate-900 dark:text-white"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Content (HTML allowed)</label>
          <quill-editor
            class="block w-full bg-white dark:bg-surface-dark"
            [modules]="quillModules"
            formControlName="sideEffectsContent"
            placeholder="Side Effects Content..."
          ></quill-editor>
        </div>
      </div>
    </div>

    <!-- Reviews Section -->
    <div class="bg-white dark:bg-surface-dark border border-slate-200 dark:border-slate-700 rounded-xl p-6 shadow-sm">
      <h2 class="text-lg font-bold text-slate-900 dark:text-white mb-4">Reviews Details</h2>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Section Title</label>
          <input
            type="text"
            formControlName="reviewsTitle"
            class="w-full h-11 px-4 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-surface-dark focus:ring-primary focus:border-primary text-slate-900 dark:text-white"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Review Images</label>
          
          <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4 mt-2">
            <!-- Existing Images -->
            <div *ngFor="let img of reviewImagesList; let i = index" class="relative group aspect-square rounded-lg border border-slate-200 dark:border-slate-700 overflow-hidden bg-slate-50 dark:bg-slate-800">
              <img [src]="imageUrlService.getImageUrl(img)" class="w-full h-full object-cover" />
              <button 
                type="button"
                (click)="removeImage(i)"
                class="absolute top-1 right-1 w-7 h-7 bg-red-500/80 hover:bg-red-600 text-white rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity backdrop-blur-sm shadow-sm"
              >
                <lucide-icon [img]="icons.Trash2" class="w-3.5 h-3.5"></lucide-icon>
              </button>
            </div>

            <!-- Upload Button -->
            <label class="border-2 border-dashed border-slate-200 dark:border-slate-700 rounded-lg flex flex-col items-center justify-center aspect-square cursor-pointer hover:border-primary hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-all group">
              <input type="file" (change)="onFileSelected($event)" multiple class="hidden" accept="image/*" />
              <div class="w-10 h-10 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center mb-2 group-hover:bg-primary/10 transition-colors">
                <lucide-icon [img]="icons.ImagePlus" class="w-5 h-5 text-slate-500 group-hover:text-primary"></lucide-icon>
              </div>
              <span class="text-xs font-medium text-slate-500 group-hover:text-primary">Upload Images</span>
            </label>
          </div>
        </div>
      </div>
    </div>
  </form>
</div>
