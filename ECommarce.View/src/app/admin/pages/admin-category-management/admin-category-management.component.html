<div class="flex flex-col gap-6">
  <div class="flex flex-col md:flex-row md:items-end justify-between gap-4 shrink-0">
    <div class="flex flex-col gap-2">
      <nav class="flex items-center text-sm text-text-sub">
        <a class="hover:text-primary transition-colors font-medium" routerLink="/admin/dashboard">Dashboard</a>
        <lucide-icon [img]="icons.ChevronRight" class="w-4 h-4 mx-1"></lucide-icon>
        <a class="hover:text-primary transition-colors" routerLink="/admin/products">Products</a>
        <lucide-icon [img]="icons.ChevronRight" class="w-4 h-4 mx-1"></lucide-icon>
        <span class="font-medium text-primary dark:text-white">Categories</span>
      </nav>
      <h2 class="text-3xl font-bold text-primary dark:text-white tracking-tight">Category Management</h2>
    </div>
    <button class="shera-btn-primary" type="button" (click)="startCreate()">
      <lucide-icon [img]="icons.Plus" class="w-5 h-5"></lucide-icon>
      <span>Add Category</span>
    </button>
  </div>

  <div class="flex flex-col lg:flex-row gap-6 items-start h-full">
    <div class="w-full lg:w-2/3 flex flex-col gap-4">
      <div class="relative flex-1 max-w-sm">
        <lucide-icon [img]="icons.Search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4.5 h-4.5 text-text-sub/50"></lucide-icon>
        <input
          class="w-full pl-9 pr-4 py-2 bg-white dark:bg-background-dark border border-border-color rounded-xl text-sm"
          placeholder="Filter categories..."
          type="text"
          [formControl]="filterControl"
        />
      </div>

      <div class="bg-white dark:bg-background-dark border border-border-color rounded-xl shadow-sm overflow-hidden">
        <div class="grid grid-cols-12 gap-4 px-6 py-4 bg-supporting/30 border-b border-border-color text-[10px] font-black uppercase text-text-sub/60 tracking-[0.2em]">
          <div class="col-span-5">Name</div>
          <div class="col-span-3 text-center">Image</div>
          <div class="col-span-2 text-center">Status</div>
          <div class="col-span-2 text-right">Actions</div>
        </div>

        <div class="divide-y divide-slate-100 dark:divide-slate-800 overflow-y-auto max-h-[600px]">
          <ng-container *ngIf="isLoading">
            <div *ngFor="let i of [1,2,3]" class="px-6 py-4 animate-pulse h-16"></div>
          </ng-container>

          <ng-container *ngIf="!isLoading">
            <div class="grid grid-cols-12 gap-4 px-6 py-4 items-center" *ngFor="let category of filteredCategories" (click)="selectCategory(category)">
              <div class="col-span-5 font-semibold text-primary dark:text-white">{{ category.name }}</div>
              <div class="col-span-3 flex justify-center">
                <div class="size-10 rounded bg-slate-100 bg-cover bg-center" [ngStyle]="{ 'background-image': category.imageUrl ? 'url(' + getImageUrl(category.imageUrl) + ')' : 'none' }"></div>
              </div>
              <div class="col-span-2 text-center">
                <span class="text-xs px-2 py-1 rounded-full" [ngClass]="category.isActive ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-500'">
                  {{ category.isActive ? 'Active' : 'Inactive' }}
                </span>
              </div>
              <div class="col-span-2 flex justify-end gap-1">
                <button class="p-1.5 rounded" type="button" (click)="$event.stopPropagation(); selectCategory(category)">
                  <lucide-icon [img]="icons.Edit" class="w-4.5 h-4.5 text-slate-400 hover:text-primary"></lucide-icon>
                </button>
                <button class="p-1.5 rounded" type="button" (click)="$event.stopPropagation(); deleteCategory(category)">
                  <lucide-icon [img]="icons.Trash2" class="w-4.5 h-4.5 text-slate-400 hover:text-red-500"></lucide-icon>
                </button>
              </div>
            </div>
          </ng-container>
        </div>
      </div>
    </div>

    <div class="w-full lg:w-1/3 shrink-0">
      <div class="bg-white dark:bg-[#1a2c32] rounded-xl border border-[#e7f0f3] dark:border-[#2a3c42] shadow-lg sticky top-0 overflow-hidden">
        <div class="px-6 py-4 border-b border-[#e7f0f3] dark:border-[#2a3c42] flex justify-between items-center bg-slate-50 dark:bg-slate-800/20">
          <h3 class="text-lg font-bold text-primary dark:text-white">{{ mode === 'create' ? 'Create Category' : 'Edit Category' }}</h3>
        </div>

        <form class="p-6 flex flex-col gap-5" [formGroup]="categoryForm">
          <div>
            <label class="block text-sm font-medium mb-1" for="cat-name">Category Name</label>
            <input class="w-full rounded-lg border-slate-300 text-sm" id="cat-name" type="text" formControlName="name" />
          </div>

          <div>
            <label class="block text-sm font-medium mb-2">Category Image</label>
            <div class="flex items-center gap-4">
              <div class="size-16 rounded-lg bg-slate-100 border border-slate-200 flex items-center justify-center overflow-hidden bg-cover bg-center relative" [ngStyle]="{ 'background-image': getPreviewUrl() ? 'url(' + getPreviewUrl() + ')' : 'none' }">
                <lucide-icon *ngIf="!getPreviewUrl()" [img]="icons.Image" class="w-8 h-8 text-slate-300"></lucide-icon>
              </div>
              <label class="flex justify-center w-full h-16 px-4 transition bg-white border-2 border-slate-300 border-dashed rounded-md cursor-pointer">
                <span class="flex items-center space-x-2">
                  <lucide-icon [img]="icons.Upload" class="w-5 h-5 text-slate-400"></lucide-icon>
                  <span class="font-medium text-slate-600 text-xs">{{ selectedImageFile ? selectedImageFile.name : 'Drop files or click to upload' }}</span>
                </span>
                <input class="hidden" type="file" accept="image/*" [disabled]="isUploadingImage" (change)="handleImageUpload($event)" />
              </label>
            </div>
          </div>

          <div class="flex items-center justify-between">
            <span class="text-sm">Active</span>
            <input type="checkbox" [formControl]="categoryForm.controls.isActive" />
          </div>

          <button class="shera-btn-primary py-2 px-6" type="button" [disabled]="isUploadingImage" (click)="saveCategory()">
            <lucide-icon [img]="icons.Save" class="w-4.5 h-4.5"></lucide-icon>
            {{ mode === 'create' ? 'Create' : 'Update' }}
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
