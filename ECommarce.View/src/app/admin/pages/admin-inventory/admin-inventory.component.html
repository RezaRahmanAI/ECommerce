<div
  class="flex-1 overflow-y-auto p-4 md:p-8 space-y-8 scroll-smooth bg-gray-50 dark:bg-[#0b1120] min-h-screen"
>
  <!-- Header -->
  <div class="flex flex-col md:flex-row md:items-center justify-between gap-6">
    <div>
      <h2
        class="text-primary dark:text-white text-3xl md:text-4xl font-black leading-tight tracking-tight"
      >
        Inventory
      </h2>
      <p class="text-gray-500 dark:text-gray-400 text-sm mt-2">
        Manage stock levels across all product variants.
      </p>
    </div>

    <div class="relative w-full md:w-96 group">
      <div
        class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none transition-colors group-focus-within:text-primary"
      >
        <app-icon
          name="Search"
          className="w-4 h-4 text-gray-400 group-focus-within:text-primary"
        ></app-icon>
      </div>
      <input
        [formControl]="searchControl"
        type="text"
        placeholder="Search by Product Name or SKU..."
        class="block w-full pl-11 pr-4 py-3 border-gray-200 dark:border-gray-700 rounded-xl bg-white dark:bg-surface-dark text-primary dark:text-white placeholder-gray-400 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-sm font-medium shadow-sm"
      />
    </div>
  </div>

  <!-- Inventory List -->
  <div class="space-y-6">
    <div
      *ngFor="let product of filteredProducts"
      class="bg-white dark:bg-surface-dark rounded-2xl border border-gray-100 dark:border-gray-800 shadow-sm overflow-hidden hover:shadow-md transition-shadow duration-300"
    >
      <!-- Product Header -->
      <div
        class="p-5 border-b border-gray-100 dark:border-gray-800 bg-gray-50/50 dark:bg-gray-800/20 flex items-center gap-4"
      >
        <img
          [src]="product.imgUrl || '/assets/placeholder.png'"
          class="w-12 h-12 rounded-lg object-cover border border-gray-200 dark:border-gray-700 bg-white"
          alt=""
        />
        <div>
          <h3 class="font-bold text-lg text-primary dark:text-white">
            {{ product.headline }}
          </h3>
          <p class="text-xs text-gray-500 font-mono">
            SKU: {{ product.productSku }}
          </p>
        </div>
        <div class="ml-auto text-right">
          <span class="text-xs text-gray-400 uppercase font-bold tracking-wider"
            >Total Stock</span
          >
          <p class="text-xl font-black text-primary dark:text-white">
            {{ product.totalStock }}
          </p>
        </div>
      </div>

      <!-- Single Stock Control -->
      <div class="px-6 py-6 pb-8 bg-white dark:bg-surface-dark flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="p-2.5 rounded-xl bg-primary/10 text-primary">
            <app-icon name="Box" className="w-5 h-5"></app-icon>
          </div>
          <div>
            <p class="text-xs font-bold text-gray-400 uppercase tracking-widest leading-none mb-1">Current Inventory</p>
            <p class="text-sm font-bold text-primary dark:text-white uppercase tracking-tight">Standard Unit Stock</p>
          </div>
        </div>

        <div class="flex items-center gap-4">
          <div *ngIf="product.variants[0].stockQuantity <= 5" class="hidden sm:flex items-center gap-2 text-red-500 bg-red-50 dark:bg-red-900/10 px-3 py-1.5 rounded-full border border-red-100 dark:border-red-900/20">
            <div class="w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse"></div>
            <span class="text-[10px] font-black uppercase tracking-wider">Low Stock Warning</span>
          </div>

          <div class="relative group/input">
            <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none text-gray-400 group-focus-within/input:text-primary transition-colors">
              <span class="text-xs font-black uppercase">Qty</span>
            </div>
            <input
              type="number"
              [value]="product.variants[0].stockQuantity"
              (change)="updateProductStock(product, $event)"
              class="w-32 pl-12 pr-4 py-2.5 text-right font-black text-primary dark:text-white bg-gray-50 dark:bg-gray-800/50 border border-gray-100 dark:border-gray-700 rounded-xl focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all outline-none"
            />
          </div>
        </div>
      </div>
    </div>

    <!-- Empty State -->
    <div
      *ngIf="filteredProducts.length === 0"
      class="p-12 text-center text-gray-500 dark:text-gray-400 bg-white dark:bg-surface-dark rounded-2xl border border-gray-100 dark:border-gray-800 border-dashed"
    >
      <app-icon
        name="Package"
        className="w-12 h-12 text-gray-300 mb-2"
      ></app-icon>
      <p class="text-lg font-medium">No products found</p>
    </div>
  </div>
</div>
