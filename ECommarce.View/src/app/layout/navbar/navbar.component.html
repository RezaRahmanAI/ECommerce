<header
  class="fixed z-50 w-full bg-white text-slate-900 border-b border-gray-100 shadow-sm"
>
  <ng-container *ngIf="vm$ | async as vm">
    <!-- Row 1: Logo, Main Nav, Utils -->
    <div class="site-container">
      <div class="flex items-center justify-between h-20">
          <!-- Logo -->
          <div class="flex-shrink-0">
            <a routerLink="/" class="flex items-center group">
              <ng-container *ngIf="vm.settings?.logoUrl; else brandText">
                <img
                  [src]="imageUrlService.getImageUrl(vm.settings.logoUrl!)"
                  [alt]="vm.settings.websiteName || 'Logo'"
                  class="h-10 md:h-12 w-auto object-contain transition-transform duration-300 group-hover:scale-105"
                  loading="lazy"
                  width="120"
                  height="48"
                />
              </ng-container>
              <ng-template #brandText>
                <span class="font-display text-2xl font-bold text-primary uppercase tracking-tighter"
                  >{{ vm.settings.websiteName || "SheraShopBD24" }}</span
                >
              </ng-template>
            </a>
          </div>

        <!-- Main Nav Links (Centered) -->
        <nav class="hidden lg:flex items-center gap-8 flex-1 justify-center px-6">
          <a
            *ngFor="let nav of vm.navLinks"
            [routerLink]="['/category', nav.slug]"
            class="text-[13px] font-bold text-primary hover:text-accent transition-colors uppercase tracking-tight"
          >{{ nav.name }}</a
          >
        </nav>

        <!-- Right Side: Utils -->
        <div class="flex items-center gap-6">
          <!-- Offer Icon -->
          <a
            routerLink="/offers"
            class="flex items-center gap-2 hover:text-accent transition-colors group"
          >
            <lucide-icon
              [img]="icons.Tag"
              class="w-5 h-5 stroke-[1.5] group-hover:rotate-12 transition-transform"
            ></lucide-icon>
            <span class="text-[13px] font-bold uppercase hidden xl:block">Offer</span>
          </a>

          <!-- Cart -->
          <a
            routerLink="/cart"
            class="relative hover:text-accent transition-colors p-1"
            aria-label="Cart"
          >
            <lucide-icon
              [img]="icons.ShoppingBag"
              class="w-6 h-6 stroke-[1.5]"
            ></lucide-icon>
            <span
              *ngIf="vm.cartCount > 0"
              class="absolute -top-1 -right-1 h-4 w-4 bg-primary text-[9px] font-bold text-white rounded-full flex items-center justify-center border border-white"
            >
              {{ vm.cartCount }}
            </span>
          </a>

          <!-- Profile -->
          <a
            routerLink="/profile"
            class="hover:text-accent transition-colors p-1"
            aria-label="Profile"
          >
            <lucide-icon
              [img]="icons.User"
              class="w-6 h-6 stroke-[1.5]"
            ></lucide-icon>
          </a>

          <!-- Mobile Toggle -->
          <button
            class="lg:hidden hover:text-accent transition-colors p-1"
            (click)="toggleMenu()"
          >
            <lucide-icon
              [img]="isMenuOpen ? icons.X : icons.Menu"
              class="w-6 h-6 stroke-[1.5]"
            ></lucide-icon>
          </button>
        </div>
      </div>
    </div>

    <!-- Row 2: Categories & Search -->
    <div class="border-t border-gray-100 py-3 hidden lg:block bg-white shadow-sm z-40">
      <div class="site-container flex items-center gap-6">
        <!-- Categories Button -->
        <div class="relative min-w-[240px]">
          <button
            (click)="toggleCategories()"
            class="w-full flex items-center justify-between px-5 py-3 bg-white border border-gray-200 rounded-lg text-sm font-bold text-primary hover:bg-gray-50 transition-all group"
          >
            <div class="flex items-center gap-3">
              <lucide-icon [img]="icons.Menu" class="w-4 h-4 group-hover:text-accent transition-colors"></lucide-icon>
              <span class="uppercase tracking-tight">All Categories</span>
            </div>
            <lucide-icon
              [img]="icons.ChevronDown"
              class="w-4 h-4 transition-transform duration-300"
              [ngClass]="{ 'rotate-180': isCategoriesOpen }"
            ></lucide-icon>
          </button>

          <!-- Dropdown -->
          <div
            *ngIf="isCategoriesOpen"
            class="absolute top-full left-0 w-full mt-2 bg-white border border-gray-100 shadow-2xl rounded-xl z-50 overflow-hidden animate-fade-in"
          >
            <div *ngFor="let item of vm.menu" class="border-b border-gray-50 last:border-0 hover:bg-gray-50 transition-colors">
              <a
                [routerLink]="['/category', item.slug]"
                (click)="isCategoriesOpen = false"
                class="flex items-center justify-between px-5 py-3.5 text-sm font-medium text-slate-700 hover:text-accent transition-all"
              >
                {{ item.name }}
              </a>
            </div>
          </div>
        </div>

        <!-- Search Bar -->
        <div class="flex-1 relative">
          <input
            type="text"
            [(ngModel)]="searchQuery"
            (keyup.enter)="onSearch()"
            placeholder="Search for products (e.g. Black Hoodie)..."
            class="w-full px-6 py-3 bg-gray-50 border border-transparent rounded-lg text-sm focus:bg-white focus:border-accent transition-all pr-12"
          />
          <button
            (click)="onSearch()"
            class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-accent transition-colors"
          >
            <lucide-icon [img]="icons.Search" class="w-5 h-5 stroke-[2]"></lucide-icon>
          </button>
        </div>
      </div>
    </div>

    <!-- Mobile Navigation Overlay (Refined) -->
    <div
      *ngIf="isMenuOpen"
      class="lg:hidden fixed inset-0 z-40 bg-white pt-24 px-6 overflow-y-auto"
    >
      <nav class="flex flex-col gap-6 w-full py-10">
        <div *ngFor="let item of vm.menu" class="border-b border-gray-100 pb-4">
          <button
            (click)="item.isOpen = !item.isOpen"
            class="flex justify-between items-center w-full py-2"
          >
            <span
              class="text-sm uppercase tracking-[0.2em] font-semibold text-slate-800"
              >{{ item.name }}</span
            >
            <lucide-icon
              [img]="icons.ChevronDown"
              class="w-5 h-5 opacity-50 transition-transform duration-300"
              [ngClass]="{ 'rotate-180': item.isOpen }"
            ></lucide-icon>
          </button>

          <div *ngIf="item.isOpen" class="flex flex-col gap-4 pl-4 pt-4 pb-2">
            <div
              *ngFor="let sub of item.subCategories"
              class="flex flex-col gap-2"
            >
              <h5
                class="text-[9px] uppercase tracking-widest font-bold text-accent"
              >
                {{ sub.name }}
              </h5>
              <ul class="flex flex-col gap-2">
                <li *ngFor="let coll of sub.collections">
                  <a
                    [routerLink]="['/collection', coll.slug]"
                    (click)="closeMenu()"
                    class="text-xs text-slate-500"
                    >{{ coll.name }}</a
                  >
                </li>
              </ul>
            </div>
          </div>
        </div>

        <div class="mt-4 flex flex-col gap-4 px-4">
          <a
            class="text-[10px] uppercase tracking-[0.15em] text-slate-400 hover:text-primary transition-colors"
            routerLink="/about"
            (click)="closeMenu()"
            >About Us</a
          >
          <a
            class="text-[10px] uppercase tracking-[0.15em] text-slate-400 hover:text-primary transition-colors"
            routerLink="/contact"
            (click)="closeMenu()"
            >Customer Care</a
          >
        </div>

        <div class="flex flex-col gap-4 mt-10">
          <ng-container *ngIf="vm.user; else loginBtn">
            <a
              *ngIf="vm.user.role === 'admin'"
              class="w-full py-3 bg-slate-100 text-slate-900 border border-slate-200 rounded-lg text-[10px] uppercase tracking-widest font-bold text-center"
              routerLink="/admin/dashboard"
              (click)="closeMenu()"
              >Admin Dashboard</a
            >
            <button
              class="w-full py-3 bg-primary text-white rounded-lg text-[10px] uppercase tracking-widest font-bold"
              (click)="logout(); closeMenu()"
            >
              Sign Out
            </button>
          </ng-container>
          <ng-template #loginBtn>
            <a
              class="w-full py-3 bg-primary text-white rounded-lg text-[10px] uppercase tracking-widest font-bold text-center"
              routerLink="/login"
              (click)="closeMenu()"
              >Sign In</a
            >
          </ng-template>
        </div>
      </nav>
    </div>
  </ng-container>
</header>
