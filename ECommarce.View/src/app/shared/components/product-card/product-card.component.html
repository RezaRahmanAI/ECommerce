<!-- Skeleton Placeholder -->
<div *ngIf="!isLoaded" class="aspect-[3/4] bg-gray-100 animate-pulse rounded-lg"></div>

<!-- Lazy Loaded Content -->
<ng-template appLazyComponent (rendered)="onRendered()">
  <div class="group relative flex flex-col bg-white overflow-hidden transition-all duration-300">
    <!-- Image Container -->
    <a [routerLink]="['/product', product.slug]" [appPrefetchOnHover]="product.slug" class="relative aspect-[3/4] block overflow-hidden bg-supporting border border-border-color rounded sm:rounded-lg">
      <img
        *ngIf="primaryMedia?.type !== 'video' && mainImage"
        [ngSrc]="imageUrlService.getImageUrl(mainImage, 400)"
        fill
        [alt]="product.headline"
        class="object-cover transition-transform duration-700 group-hover:scale-105"
      />
      <video
        *ngIf="primaryMedia?.type === 'video' && mainImage"
        [src]="imageUrlService.getImageUrl(mainImage)"
        class="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-105"
        autoplay
        muted
        loop
        playsinline
      ></video>
      
      <!-- Sophisticated Badge -->
      <div class="absolute top-1 sm:top-1.5 left-1 sm:left-1.5">
        <span *ngIf="hasDiscount" class="px-1 py-0.5 bg-accent text-white text-[7px] sm:text-[8px] font-bold uppercase rounded shadow-lg shadow-accent/20">
          -{{ discountPercentage }}%
        </span>
      </div>
    </a>

    <!-- Content Area -->
    <div class="pt-3 sm:pt-4 pb-2 px-2 sm:px-4 flex flex-col gap-2 md:gap-3 flex-1">
      <!-- Meta Info -->
      <div>
        <p class="text-[10px] sm:text-xs md:text-sm text-primary font-semibold uppercase tracking-tight truncate">{{ product.headline }}</p>
        <div class="flex items-center gap-2">
          <h3 class="text-sm sm:text-base md:text-lg font-bold text-accent leading-none">৳{{ currentPrice }}</h3>
          <span *ngIf="hasDiscount" class="text-[9px] sm:text-xs text-gray-300 line-through font-medium">৳{{ originalPrice }}</span>
        </div>
      </div>

      <!-- Actions -->
      <div class="mt-auto">
        <div class="flex flex-col gap-1.5 md:gap-2">
          <button
            (click)="addToCart($event)"
            class="w-full h-8 sm:h-10 md:h-12 bg-white text-primary border border-gray-300 rounded text-[10px] sm:text-xs md:text-sm font-bold uppercase tracking-wider hover:bg-primary hover:text-white hover:border-primary transition-all duration-300"
          >
            ADD TO CART
          </button>
          <button
            (click)="orderNow($event)"
            class="w-full h-8 sm:h-10 md:h-12 bg-accent text-white rounded text-[10px] sm:text-xs md:text-sm font-bold uppercase tracking-wider hover:opacity-90 transition-all shadow-sm"
          >
            ORDER NOW
          </button>
        </div>
      </div>
    </div>
  </div>
</ng-template>
