<div class="group relative flex flex-col bg-white overflow-hidden transition-all duration-300">
  <!-- Image Container -->
  <a [routerLink]="['/product', product.slug]" class="relative aspect-[3/4] block overflow-hidden bg-supporting border border-border-color rounded sm:rounded-lg">
    <img
      *ngIf="mainImage"
      [src]="imageUrlService.getImageUrl(mainImage)"
      [alt]="product.name"
      loading="lazy"
      decoding="async"
      class="h-full w-full object-cover transition-transform duration-700 group-hover:scale-105"
    />
    
    <!-- Sophisticated Badge -->
    <div class="absolute top-1 sm:top-1.5 left-1 sm:left-1.5">
      <span *ngIf="hasDiscount" class="px-1 py-0.5 bg-accent text-white text-[7px] sm:text-[8px] font-bold uppercase rounded shadow-lg shadow-accent/20">
        -{{ discountPercentage }}%
      </span>
    </div>
  </a>

  <!-- Content Area -->
  <div class="pt-3 sm:pt-4 pb-2 px-2 sm:px-4 flex flex-col gap-2 md:gap-3 flex-1">
    <!-- Meta Info -->
    <div>
      <p class="text-[10px] sm:text-xs md:text-sm text-primary font-semibold uppercase tracking-tight truncate">{{ product.sku || 'PL152' }} {{ product.name }}</p>
      <div class="flex items-center gap-2">
        <h3 class="text-sm sm:text-base md:text-lg font-bold text-accent leading-none">৳{{ currentPrice }}</h3>
        <span *ngIf="hasDiscount" class="text-[9px] sm:text-xs text-gray-300 line-through font-medium">৳{{ originalPrice }}</span>
      </div>
    </div>

    <!-- Size Selector -->
    <div *ngIf="availableSizes.length > 0" class="flex flex-wrap gap-1.5">
      <button
        *ngFor="let size of availableSizes"
        (click)="selectSize(size); $event.preventDefault(); $event.stopPropagation()"
        class="h-6 sm:h-8 min-w-[1.75rem] sm:min-w-[2rem] px-1 flex items-center justify-center text-[10px] sm:text-xs font-bold uppercase transition-all rounded-sm border"
        [ngClass]="selectedSize === size 
          ? 'bg-primary text-white border-primary' 
          : 'bg-white text-gray-400 border-gray-100 hover:border-accent'"
      >
        {{ size }}
      </button>
    </div>

    <!-- Actions -->
    <div class="mt-auto">
      <div class="flex flex-col gap-1.5 md:gap-2">
        <button
          (click)="addToCart($event)"
          class="w-full h-8 sm:h-10 md:h-12 bg-white text-primary border border-gray-300 rounded text-[10px] sm:text-xs md:text-sm font-bold uppercase tracking-wider hover:bg-primary hover:text-white hover:border-primary transition-all duration-300"
        >
          ADD TO CART
        </button>
        <button
          (click)="orderNow($event)"
          class="w-full h-8 sm:h-10 md:h-12 bg-accent text-white rounded text-[10px] sm:text-xs md:text-sm font-bold uppercase tracking-wider hover:opacity-90 transition-all shadow-sm"
        >
          ORDER NOW
        </button>
      </div>
    </div>
  </div>

  <!-- Quick Add Modal -->
  <app-quick-add-modal
    *ngIf="showQuickAdd"
    [product]="$any(product)"
    [initialSize]="selectedSize"
    (close)="showQuickAdd = false; isOrdering = false"
    (added)="onQuickAddConfirm($event)"
  ></app-quick-add-modal>
</div>
